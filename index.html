<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Item Capture</title>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 22px;
      margin: 14px 0;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }

    #photoPreview {
      width: 100%;
      margin-top: 10px;
      border-radius: 12px;
      display: none;
    }

    #audioPreview {
      width: 100%;
      margin-top: 10px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
      color: #333;
      min-height: 24px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <button id="backBtn" type="button">← Back</button>

    <input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden">
    <button id="photoBtn" type="button">Take Photo</button>
    <img id="photoPreview" alt="Photo preview">

    <button id="recordBtn" type="button">Hold to Record</button>
    <audio id="audioPreview" controls></audio>

    <button id="submitBtn" type="button" disabled>Submit</button>

    <div id="status"></div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-VMFotIWEQFgx3goZ2e9PnGOEfeet5WYnS8XvcWQeivqIFlWZGYIGGklmkaZRiCWD/exec";
    const BACK_URL = "https://sites.google.com/menascouae.com/snag/home";

    let selectedPhotoFile = null;
    let photoPreviewUrl = null;

    let mediaRecorder = null;
    let audioStream = null;
    let audioChunks = [];
    let recordedAudioBlob = null;
    let audioPreviewUrl = null;

    let micPrimed = false;
    let isHolding = false;
    let isSubmitting = false;

    const backBtn = document.getElementById("backBtn");
    const photoInput = document.getElementById("photoInput");
    const photoBtn = document.getElementById("photoBtn");
    const photoPreview = document.getElementById("photoPreview");
    const recordBtn = document.getElementById("recordBtn");
    const audioPreview = document.getElementById("audioPreview");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function updateSubmit() {
      submitBtn.disabled = isSubmitting || !selectedPhotoFile || !recordedAudioBlob;
    }

    function resetPhotoPreview() {
      try {
        if (photoPreviewUrl) URL.revokeObjectURL(photoPreviewUrl);
      } catch (e) {}
      photoPreviewUrl = null;
      photoPreview.src = "";
      photoPreview.style.display = "none";
    }

    function showPhotoPreview(file) {
      resetPhotoPreview();
      photoPreviewUrl = URL.createObjectURL(file);
      photoPreview.src = photoPreviewUrl;
      photoPreview.style.display = "block";
    }

    function resetAudioPreview() {
      try {
        if (audioPreviewUrl) URL.revokeObjectURL(audioPreviewUrl);
      } catch (e) {}
      audioPreviewUrl = null;
      audioPreview.src = "";
      audioPreview.style.display = "none";
    }

    function showAudioPreview(blob) {
      resetAudioPreview();
      audioPreviewUrl = URL.createObjectURL(blob);
      audioPreview.src = audioPreviewUrl;
      audioPreview.style.display = "block";
      audioPreview.load();
    }

    function toBase64(fileOrBlob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          resolve(result.split(",")[1] || "");
        };
        reader.onerror = reject;
        reader.readAsDataURL(fileOrBlob);
      });
    }

    function getSupportedMimeType() {
      const types = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4"
      ];
      for (const type of types) {
        try {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
            return type;
          }
        } catch (e) {}
      }
      return "";
    }

    async function primeMicPermissionOnly() {
      if (micPrimed) return true;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Microphone not supported");
        return false;
      }

      try {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        s.getTracks().forEach(t => t.stop());
        micPrimed = true;
        setStatus("Microphone enabled. Now hold to record.");
        return true;
      } catch (err) {
        setStatus("Microphone permission denied");
        return false;
      }
    }

    async function startRecording() {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      recordedAudioBlob = null;
      updateSubmit();

      const mimeType = getSupportedMimeType();
      mediaRecorder = mimeType
        ? new MediaRecorder(audioStream, { mimeType })
        : new MediaRecorder(audioStream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) {
          audioChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const finalType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : "audio/webm";
        recordedAudioBlob = new Blob(audioChunks, { type: finalType });
        showAudioPreview(recordedAudioBlob);
        recordBtn.textContent = "Recorded";
        setStatus("Audio recorded");
        try {
          if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        } catch (e) {}
        audioStream = null;
        updateSubmit();
      };

      mediaRecorder.start();
    }

    function stopRecordingIfActive() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    function endHold() {
      if (!isHolding) return;
      isHolding = false;
      stopRecordingIfActive();
    }

    backBtn.addEventListener("click", () => {
      window.open(BACK_URL, "_blank");
    });

    photoBtn.addEventListener("click", () => {
      photoInput.click();
    });

    photoInput.addEventListener("change", (e) => {
      selectedPhotoFile = e.target.files && e.target.files[0] ? e.target.files[0] : null;

      if (selectedPhotoFile) {
        photoBtn.textContent = "Photo Selected";
        showPhotoPreview(selectedPhotoFile);
        setStatus("Photo selected");
      } else {
        photoBtn.textContent = "Take Photo";
        resetPhotoPreview();
      }

      updateSubmit();
    });

    recordBtn.addEventListener("pointerdown", async () => {
      if (isSubmitting || isHolding) return;

      if (!window.isSecureContext) {
        setStatus("Microphone requires HTTPS");
        return;
      }

      if (!micPrimed) {
        await primeMicPermissionOnly();
        return;
      }

      isHolding = true;
      recordBtn.textContent = "Recording...";

      try {
        await startRecording();
      } catch (err) {
        isHolding = false;
        recordBtn.textContent = "Hold to Record";
        setStatus("Recording failed");
        try {
          if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        } catch (e) {}
        audioStream = null;
      }
    });

    recordBtn.addEventListener("pointerup", endHold);
    recordBtn.addEventListener("pointercancel", endHold);

    submitBtn.addEventListener("click", async () => {
      if (isSubmitting) return;

      if (!selectedPhotoFile) {
        setStatus("Please take photo");
        return;
      }

      if (!recordedAudioBlob) {
        setStatus("Please record audio");
        return;
      }

      isSubmitting = true;
      updateSubmit();
      setStatus("Submitting...");

      try {
        const photoB64 = await toBase64(selectedPhotoFile);
        const audioB64 = await toBase64(recordedAudioBlob);
        const audioMime = recordedAudioBlob.type || "application/octet-stream";

        let ext = ".webm";
        if (audioMime.includes("mp4")) ext = ".mp4";

        const payload = {
          photo: {
            filename: selectedPhotoFile.name || ("photo_" + Date.now() + ".jpg"),
            mimeType: selectedPhotoFile.type || "image/jpeg",
            base64Data: photoB64
          },
          audio: {
            filename: "audio_" + Date.now() + ext,
            mimeType: audioMime,
            base64Data: audioB64
          }
        };

        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error(text || "Invalid server response");
        }

        if (!result.ok) {
          throw new Error(result.error || "Submit failed");
        }

        setStatus("Submitted");

        photoInput.value = "";
        selectedPhotoFile = null;
        photoBtn.textContent = "Take Photo";
        resetPhotoPreview();

        recordedAudioBlob = null;
        audioChunks = [];
        mediaRecorder = null;
        recordBtn.textContent = "Hold to Record";
        resetAudioPreview();

        updateSubmit();

      } catch (err) {
        setStatus("Error: " + (err && err.message ? err.message : err));
      } finally {
        isSubmitting = false;
        updateSubmit();
      }
    });

    updateSubmit();
  </script>
</body>
</html>
