<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Item Capture</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 26px 18px;
      margin: 16px 0;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #5b7cfa 0%, #7a49b6 100%);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      touch-action: manipulation;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-submit {
      background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
    }

    .hidden {
      display: none;
    }

    #status {
      margin-top: 12px;
      color: white;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      min-height: 24px;
    }

    #audioPreview {
      width: 100%;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden" />
    <button id="photoBtn" class="btn" type="button">📷 Take Photo</button>

    <button id="recordBtn" class="btn" type="button">🎙️ Hold to Record</button>

    <audio id="audioPreview" controls class="hidden"></audio>

    <button id="submitBtn" class="btn btn-submit" type="button" disabled>✓ Submit</button>

    <div id="status"></div>
  </div>

  <script>
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz-VMFotIWEQFgx3goZ2e9PnGOEfeet5WYnS8XvcWQeivqIFlWZGYIGGklmkaZRiCWD/exec";

    let selectedPhotoFile = null;
    let mediaRecorder = null;
    let audioStream = null;
    let audioChunks = [];
    let recordedAudioBlob = null;
    let isHolding = false;
    let isSubmitting = false;
    let audioPreviewUrl = null;

    const photoInput = document.getElementById("photoInput");
    const photoBtn = document.getElementById("photoBtn");
    const recordBtn = document.getElementById("recordBtn");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const audioPreviewEl = document.getElementById("audioPreview");

    function setStatus(text) {
      statusEl.textContent = text || "";
    }

    function updateSubmitState() {
      submitBtn.disabled = isSubmitting || !selectedPhotoFile || !recordedAudioBlob;
    }

    function resetAudioPreview() {
      try {
        if (audioPreviewUrl) URL.revokeObjectURL(audioPreviewUrl);
      } catch (e) {}
      audioPreviewUrl = null;
      audioPreviewEl.src = "";
      audioPreviewEl.classList.add("hidden");
    }

    function showAudioPreview(blob) {
      resetAudioPreview();
      audioPreviewUrl = URL.createObjectURL(blob);
      audioPreviewEl.src = audioPreviewUrl;
      audioPreviewEl.classList.remove("hidden");
      audioPreviewEl.load();
    }

    function toBase64(fileOrBlob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          resolve(result.split(",")[1] || "");
        };
        reader.onerror = reject;
        reader.readAsDataURL(fileOrBlob);
      });
    }

    function getSupportedMimeType() {
      const types = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4"
      ];
      for (const type of types) {
        try {
          if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) {
            return type;
          }
        } catch (e) {}
      }
      return "";
    }

    async function startRecording() {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      recordedAudioBlob = null;
      updateSubmitState();

      const mimeType = getSupportedMimeType();
      mediaRecorder = mimeType
        ? new MediaRecorder(audioStream, { mimeType })
        : new MediaRecorder(audioStream);

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) {
          audioChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const finalMime = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : (mimeType || "audio/webm");
        recordedAudioBlob = new Blob(audioChunks, { type: finalMime });
        showAudioPreview(recordedAudioBlob);
        recordBtn.textContent = "✅ Recorded";
        try {
          if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        } catch (e) {}
        audioStream = null;
        updateSubmitState();
      };

      mediaRecorder.start();
    }

    function stopRecordingIfActive() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }

    photoBtn.addEventListener("click", () => {
      photoInput.click();
    });

    photoInput.addEventListener("change", (e) => {
      selectedPhotoFile = e.target.files && e.target.files[0] ? e.target.files[0] : null;
      if (selectedPhotoFile) {
        photoBtn.textContent = "✅ Photo Selected";
      } else {
        photoBtn.textContent = "📷 Take Photo";
      }
      updateSubmitState();
    });

    recordBtn.addEventListener("pointerdown", async () => {
      if (isHolding || isSubmitting) return;

      if (!window.isSecureContext) {
        setStatus("Microphone requires HTTPS");
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Mic not supported");
        return;
      }

      if (!window.MediaRecorder) {
        setStatus("Recorder not supported");
        return;
      }

      isHolding = true;
      recordBtn.textContent = "🔴 Recording...";

      try {
        await startRecording();
      } catch (err) {
        isHolding = false;
        recordBtn.textContent = "🎙️ Hold to Record";
        setStatus("Recording failed");
        try {
          if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        } catch (e) {}
        audioStream = null;
      }
    });

    function endHold() {
      if (!isHolding) return;
      isHolding = false;
      stopRecordingIfActive();
    }

    recordBtn.addEventListener("pointerup", endHold);
    recordBtn.addEventListener("pointercancel", endHold);

    submitBtn.addEventListener("click", async () => {
      if (isSubmitting) return;
      if (!selectedPhotoFile || !recordedAudioBlob) return;

      isSubmitting = true;
      updateSubmitState();
      setStatus("Submitting...");

      try {
        const photoB64 = await toBase64(selectedPhotoFile);
        const audioB64 = await toBase64(recordedAudioBlob);
        const audioMime = recordedAudioBlob.type || "application/octet-stream";

        let ext = ".webm";
        if (audioMime.includes("mp4")) ext = ".mp4";

        const payload = {
          photo: {
            filename: selectedPhotoFile.name || ("photo_" + Date.now() + ".jpg"),
            mimeType: selectedPhotoFile.type || "image/jpeg",
            base64Data: photoB64
          },
          audio: {
            filename: "audio_" + Date.now() + ext,
            mimeType: audioMime,
            base64Data: audioB64
          }
        };

        const res = await fetch(WEBAPP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          throw new Error(text || "Invalid server response");
        }

        if (!result.ok) {
          throw new Error(result.error || "Submit failed");
        }

        setStatus("Submitted successfully");

        photoInput.value = "";
        selectedPhotoFile = null;
        photoBtn.textContent = "📷 Take Photo";

        recordedAudioBlob = null;
        audioChunks = [];
        mediaRecorder = null;
        recordBtn.textContent = "🎙️ Hold to Record";
        resetAudioPreview();

      } catch (err) {
        setStatus("Error: " + (err && err.message ? err.message : err));
      } finally {
        isSubmitting = false;
        updateSubmitState();
      }
    });

    updateSubmitState();
  </script>
</body>
</html>
